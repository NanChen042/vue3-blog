<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8ef"/>
      <stop offset="100%" stop-color="#eee4da"/>
    </linearGradient>
    <linearGradient id="g2048" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edc22e"/>
      <stop offset="100%" stop-color="#edc050"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
